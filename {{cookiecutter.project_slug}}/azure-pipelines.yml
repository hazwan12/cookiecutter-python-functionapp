# Branch strategy:
#   feature/*, dev  - local integration branches. Security scan + SCA/SAST/Test run for fast
#                      feedback, but no package is built.
#   release/*       - cut per release cycle (e.g. release/2026-08). Accumulates changes destined
#                      for a release. This is the only branch family that builds the package -
#                      build once, then fan out to UAT and Production below (build-once-deploy-many).
trigger:
  - feature/*
  - dev
  - release/*

pr:
  branches:
    include:
      - main

variables:
  pythonVersion: '{{ cookiecutter.python_version }}'
  vmImageName: 'ubuntu-latest'
  packageName: '{{ cookiecutter.package_name }}'
  functionAppName: '{{ cookiecutter.function_app_name }}'
  isReleaseBranch: $[startsWith(variables['Build.SourceBranch'], 'refs/heads/release/')]

stages:
  # Microsoft Defender for DevOps runs unconditionally as the org-wide baseline scan
  # (secrets, IaC misconfig, credential scanning). SAST and SCA below each run exactly
  # one tool, chosen at scaffold time via cookiecutter's sast_tool / sca_tool prompts.
  # CodeQL-based options require GitHub Advanced Security for Azure DevOps to be enabled
  # on this repo (Project Settings > Repositories > Advanced Security) - if it isn't
  # licensed/enabled, regenerate with sast_tool=bandit / sca_tool=pip-audit instead.
  - stage: SecurityScan
    displayName: 'Security Scan'
    jobs:
      - job: DefenderForDevOps
        displayName: 'Microsoft Defender for DevOps'
        pool:
          vmImage: $(vmImageName)
        continueOnError: false
        steps:
          - task: MicrosoftSecurityDevOps@1
            displayName: 'Run Code Analysis'
            inputs:
              policy: azuredevops
              publish: true
              artifactName: 'CodeAnalysisLogs'

  - stage: SCA
    displayName: 'Software Composition Analysis'
    dependsOn: SecurityScan
    jobs:
{% if cookiecutter.sca_tool == "dependency-scanning" %}
      - job: DependencyScanning
        displayName: 'GitHub Advanced Security Dependency Scanning'
        pool:
          vmImage: $(vmImageName)
        steps:
          - task: AdvancedSecurity-Dependency-Scanning@1
            displayName: 'CodeQL Dependency Scanning'
{% else %}
      - job: PipAudit
        pool:
          vmImage: $(vmImageName)
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '$(pythonVersion)'

          - script: |
              python -m pip install --upgrade pip
              pip install -r requirements.txt
              pip install pip-audit
            displayName: 'Install dependencies'

          - script: |
              pip-audit -r requirements.txt --format json --output pip-audit-report.json
            displayName: 'Run pip-audit'
            continueOnError: true

          - publish: pip-audit-report.json
            artifact: sca-report
            displayName: 'Publish SCA report'
{% endif %}

  - stage: SAST
    displayName: 'Static Application Security Testing'
    dependsOn: SecurityScan
    jobs:
{% if cookiecutter.sast_tool == "codeql" %}
      - job: CodeQL
        displayName: 'GitHub Advanced Security CodeQL'
        pool:
          vmImage: $(vmImageName)
        steps:
          - task: AdvancedSecurity-Codeql-Init@1
            displayName: 'CodeQL Init'
            inputs:
              enableAutomaticCodeQLInstall: true
              languages: 'python'

          - task: AdvancedSecurity-Codeql-Analyze@1
            displayName: 'CodeQL Analyze'
{% else %}
      - job: Bandit
        pool:
          vmImage: $(vmImageName)
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '$(pythonVersion)'

          - script: |
              python -m pip install --upgrade pip
              pip install bandit
            displayName: 'Install Bandit'

          - script: |
              bandit -r $(packageName) -f json -o bandit-report.json
            displayName: 'Run Bandit'
            continueOnError: true

          - publish: bandit-report.json
            artifact: sast-report
            displayName: 'Publish SAST report'
{% endif %}

  - stage: Test
    displayName: 'Unit Tests'
    dependsOn: SecurityScan
    jobs:
      - job: PyTest
        pool:
          vmImage: $(vmImageName)
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '$(pythonVersion)'

          - script: |
              python -m pip install --upgrade pip
              pip install -r requirements.txt
              pip install -r requirements-dev.txt
            displayName: 'Install dependencies'

          - script: |
              pytest --junitxml=junit/test-results.xml --cov=$(packageName) --cov-report=xml --cov-report=html
            displayName: 'Run pytest with coverage'

          - task: PublishTestResults@2
            condition: succeededOrFailed()
            inputs:
              testResultsFiles: 'junit/test-results.xml'
              testRunTitle: 'Publish test results'

          - task: PublishCodeCoverageResults@2
            inputs:
              summaryFileLocation: 'coverage.xml'

  # --- Build once ---------------------------------------------------------
  # Only builds on release/* branches. UAT and Production below both deploy this
  # same package artifact - never rebuilt per environment.
  - stage: Build
    displayName: 'Compile & Package'
    condition: and(succeeded(), eq(variables.isReleaseBranch, 'True'))
    dependsOn:
      - SCA
      - SAST
      - Test
    jobs:
      - job: Build
        pool:
          vmImage: $(vmImageName)
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '$(pythonVersion)'
            displayName: 'Use Python $(pythonVersion)'

          - script: |
              python -m pip install --upgrade pip
              pip install -r requirements.txt --target=".python_packages/lib/site-packages"
            displayName: 'Install dependencies into deployment package'

          - script: |
              python -m compileall $(packageName)
            displayName: 'Compile (syntax check)'

          - task: ArchiveFiles@2
            displayName: 'Archive function app'
            inputs:
              rootFolderOrFile: '$(System.DefaultWorkingDirectory)'
              includeRootFolder: false
              archiveType: 'zip'
              archiveFile: '$(Build.ArtifactStagingDirectory)/$(functionAppName)-$(Build.BuildId).zip'

          - publish: '$(Build.ArtifactStagingDirectory)/$(functionAppName)-$(Build.BuildId).zip'
            artifact: drop
            displayName: 'Publish build artifact'

  # --- Deploy many ---------------------------------------------------------
  # DISCLAIMER: the DeployUAT / DeployProduction stages below are an illustrative example only,
  # showing how the build-once artifact fans out to multiple environments. Actual release/deployment
  # pipelines for this project should be configured in Azure DevOps under Pipelines > Releases
  # (or an equivalent environment-gated YAML pipeline maintained separately), not by editing this
  # example in place. Do not treat these stages as production-ready as-is.
  #
  # Each deployment job targets an Azure DevOps environment. Configure approvals/checks
  # on the '{{ cookiecutter.uat_environment_name }}' and '{{ cookiecutter.prod_environment_name }}'
  # environments in Project Settings > Environments (e.g. manual approval before Production).
  - stage: DeployUAT
    displayName: 'Deploy to UAT'
    dependsOn: Build
    condition: and(succeeded(), eq(variables.isReleaseBranch, 'True'))
    jobs:
      - deployment: DeployFunctionApp
        displayName: 'Deploy Function App (UAT)'
        environment: '{{ cookiecutter.uat_environment_name }}'
        pool:
          vmImage: $(vmImageName)
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureFunctionApp@2
                  displayName: 'Deploy to Azure Function App (UAT)'
                  inputs:
                    azureSubscription: 'azure-service-connection-uat'
                    appType: 'functionAppLinux'
                    appName: '$(functionAppName)-uat'
                    package: '$(Pipeline.Workspace)/drop/$(functionAppName)-$(Build.BuildId).zip'

  - stage: DeployProduction
    displayName: 'Deploy to Production'
    dependsOn: DeployUAT
    condition: and(succeeded(), eq(variables.isReleaseBranch, 'True'))
    jobs:
      - deployment: DeployFunctionApp
        displayName: 'Deploy Function App (Production)'
        environment: '{{ cookiecutter.prod_environment_name }}'
        pool:
          vmImage: $(vmImageName)
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureFunctionApp@2
                  displayName: 'Deploy to Azure Function App (Production)'
                  inputs:
                    azureSubscription: 'azure-service-connection-prod'
                    appType: 'functionAppLinux'
                    appName: '$(functionAppName)-prod'
                    package: '$(Pipeline.Workspace)/drop/$(functionAppName)-$(Build.BuildId).zip'
